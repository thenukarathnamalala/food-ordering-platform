apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: {{ .Values.images.apiGateway }}
        ports:
        - containerPort: {{ .Values.ports.apiGateway }}
        env:
        - name: PORT
          value: "{{ .Values.ports.apiGateway }}"
        - name: USER_SERVICE_URL
          value: "http://user-service:5001"
        - name: RESTAURANT_SERVICE_URL
          value: "http://restaurant-service:5002"
        - name: ORDER_SERVICE_URL
          value: "http://order-service:5003"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: api-gateway
  ports:
  - port: {{ .Values.ports.apiGateway }}
    targetPort: {{ .Values.ports.apiGateway }}