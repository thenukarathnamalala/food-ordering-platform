apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: {{ .Values.images.orderService }}
        ports:
        - containerPort: {{ .Values.ports.orderService }}
        env:
        - name: PORT
          value: "{{ .Values.ports.orderService }}"
        - name: MONGO_URI
          value: "mongodb://mongo:27017/order-service-db"
        - name: RABBITMQ_URL
          value: "amqp://rabbitmq:5672"

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: order-service
  ports:
  - port: {{ .Values.ports.orderService }}
    targetPort: {{ .Values.ports.orderService }}