apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: food-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: thenu8175/food-api-gateway:latest
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: USER_SERVICE_URL
          value: "http://user-service:5001"
        - name: RESTAURANT_SERVICE_URL
          value: "http://restaurant-service:5002"
        - name: ORDER_SERVICE_URL
          value: "http://order-service:5003"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: food-app
spec:
  selector:
    app: api-gateway
  ports:
  - port: 5000
    targetPort: 5000