apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
  namespace: food-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restaurant-service
  template:
    metadata:
      labels:
        app: restaurant-service
    spec:
      containers:
      - name: restaurant-service
        image: thenu8175/food-restaurant-service:latest
        ports:
        - containerPort: 5002
        env:
        - name: PORT
          value: "5002"
        - name: MONGO_URI
          value: "mongodb://mongo:27017/restaurant-service-db"
        - name: RABBITMQ_URL
          value: "amqp://rabbitmq:5672"
---
apiVersion: v1
kind: Service
metadata:
  name: restaurant-service
  namespace: food-app
spec:
  selector:
    app: restaurant-service
  ports:
  - port: 5002
    targetPort: 5002