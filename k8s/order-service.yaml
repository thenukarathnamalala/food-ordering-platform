apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: food-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: thenu8175/food-order-service:latest
        ports:
        - containerPort: 5003
        env:
        - name: PORT
          value: "5003"
        - name: MONGO_URI
          value: "mongodb://mongo:27017/order-service-db"
        - name: RABBITMQ_URL
          value: "amqp://rabbitmq:5672"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: food-app
spec:
  selector:
    app: order-service
  ports:
  - port: 5003
    targetPort: 5003