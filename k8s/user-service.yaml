apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: food-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: thenu8175/food-user-service:latest
        ports:
        - containerPort: 5001
        env:
        - name: PORT
          value: "5001"
        - name: MONGO_URI
          value: "mongodb://mongo:27017/user-service-db"
        - name: JWT_SECRET
          value: "mysecretkey"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: food-app
spec:
  selector:
    app: user-service
  ports:
  - port: 5001
    targetPort: 5001